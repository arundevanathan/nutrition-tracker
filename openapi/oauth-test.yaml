openapi: 3.1.0
info:
  title: Nutrition Tracker OAuth Test
  version: 0.1.0
  description: Minimal Custom GPT Action for validating OAuth account linking.
servers:
  - url: https://nutrition-tracker.arun-devanathan.workers.dev
paths:
  /me:
    get:
      operationId: getAuthenticatedUser
      summary: Get authenticated user details
      description: Returns the Supabase user details associated with the linked Custom GPT account.
      security:
        - OAuth2: []
      responses:
        "200":
          description: Authenticated user details
          content:
            application/json:
              schema:
                type: object
                required:
                  - user_id
                  - email
                  - timezone
                  - calorie_target
                  - protein_target_g
                properties:
                  user_id:
                    type: string
                  email:
                    type: string
                    format: email
                  display_name:
                    type:
                      - string
                      - "null"
                  timezone:
                    type: string
                  calorie_target:
                    type: integer
                  protein_target_g:
                    type: number
        "401":
          description: Missing, invalid, or expired bearer token
components:
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://nutrition-tracker.arun-devanathan.workers.dev/oauth/authorize
          tokenUrl: https://nutrition-tracker.arun-devanathan.workers.dev/oauth/token
          scopes: {}